<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">detalle</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>

<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Detalle de la app</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <h1>Detalle de registro</h1>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Tipo recibido</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ tipo }}
    </ion-card-content>
  </ion-card>
</ion-content>

<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Detalle de la app</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <h1>Comunicación entre componentes</h1>
  <app-resumen-app [tipo]="tipo"></app-resumen-app>
</ion-content>
